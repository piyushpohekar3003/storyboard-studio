<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Storyboard Studio{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="nav">
        <h1><a href="/">Storyboard Studio</a></h1>
        <div class="nav-links">
            <a href="/" class="{{ 'active' if request.path == '/' else '' }}">New Project</a>
            <a href="/bytes" class="{{ 'active' if request.path == '/bytes' else '' }}">Bytes</a>
            <a href="/history" class="{{ 'active' if request.path == '/history' else '' }}">History</a>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    {% block scripts %}{% endblock %}
</body>
</html>
