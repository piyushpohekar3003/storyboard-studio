<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Storyboard Generator{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="bg-gradient"></div>
    <nav class="nav">
        <h1><a href="/">✦ Storyboard Studio</a></h1>
        <div class="nav-links">
            <a href="/" class="{{ 'active' if request.path == '/' else '' }}">New Project</a>
            <a href="/history" class="{{ 'active' if request.path == '/history' else '' }}">History</a>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
    document.querySelectorAll('.glass').forEach(card => {
        card.addEventListener('mousemove', e => {
            const r = card.getBoundingClientRect();
            card.style.setProperty('--mx', (e.clientX - r.left) + 'px');
            card.style.setProperty('--my', (e.clientY - r.top) + 'px');
        });
    });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
